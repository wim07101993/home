services:
  db:
    restart: unless-stopped
    image: postgres:17-alpine
    environment:
      PGUSER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      PGDATA: /data/postgres
    ports:
      - "5432:5432"
    networks:
      - backup-network
    secrets:
      - db_password
    volumes:
      - /docker-volumes/backup-server/db/data:/data/postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 10s
      timeout: 30s
      retries: 5
      start_period: 20s

  databasus:
    container_name: databasus
    restart: unless-stopped
    image: databasus/databasus:latest
    ports:
      - "4005:4005"
    volumes:
      - ./databasus-data:/databasus-data

networks:
  backup-network:

secrets:
  db_password:
    file: /docker-volumes/backup-server/db/db_password.txt
