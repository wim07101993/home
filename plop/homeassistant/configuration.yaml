# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

openid:
  client_id: "CLIENT_ID"
  client_secret: "CLIENT_SECRET"
  configure_url: "https://auth.wvl.app/.well-known/openid-configuration"
  username_field: "preferred_username"
  scope: "openid profile email"
  block_login: true
  trusted_ips: # List of CIDR blocks that are not affected by block_login
    - "100.117.36.52/24"
    - "10.0.0.0/8"
  openid_text: "Login with Home"  # Text to display on the login page
  create_user: true  # Automatically create users on first login