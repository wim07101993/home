server:
  port: 80
  database: "postgres://filebrowser:${PASSWORD}@db:5432/filebrowser?sslmode=disable"
  sources:
    - path: "/files/wim"
      name: "Wim privé"
      config:
        defaultEnabled: false
    - path: "/files/sara"
      name: "Sara privé"
      config:
        defaultEnabled: false
    - path: "/files/gezin-officieel"
      name: "Gezin officieel"
      config:
        defaultEnabled: false
    - path: "/files/gezin-officieel-archive"
      name: "Gezin officieel archive"
      config:
        defaultEnabled: false
    - path: "/files/audio"
      name: "Audio"
      config:
        defaultEnabled: false
    - path: "/files/audio-archive"
      name: "Audio archive"
      config:
        defaultEnabled: false

auth:
  methods:
    password:
      enabled: true
    oidc:
      enabled: true
      issuerUrl: "https://auth.wvl.app"
      clientId: "367153386023354372"
      # clientSecret: "your-client-secret"
      # Scopes required by Zitadel
      scopes: "openid profile email groups"
      userIdentifier: "preferred_username"
      createUser: true
      groupsClaim: "groups"
      adminGroup: "fb_admins"

# If you want to add Collabora/Euro-Office later:
