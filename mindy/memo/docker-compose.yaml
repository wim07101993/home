services:
  memo:
    restart: "unless-stopped"
    image: neosmemo/memos:0.26.2
    networks:
      - traefik_traefik-network
      - db_db-network
      - memo-network
    environment:
      - MEMOS_DRIVER=postgres
      - MEMOS_DSN_FILE=/run/secrets/db_connection_string
    secrets:
      - db_connection_string
    ports:
      - "3007:5230"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_traefik-network"
      - "traefik.http.routers.memo.rule=Host(`memo.wvl.app`)"
      - "traefik.http.routers.memo.entrypoints=websecure"
      - "traefik.http.routers.memo.tls.certresolver=le"
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          pids: 99


secrets:
  db_connection_string:
    file: /docker-volumes/memos/db_connection_string.txt

networks:
  memo-network:
  db_db-network:
    external: true
  traefik_traefik-network:
    external: true
